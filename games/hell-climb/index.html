<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hell Climb</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hud">
    <div class="hud-left">
      <div class="title-row">
        <div class="title">HELL CLIMB</div>
        <div class="badge" id="modeBadge">CLASSIC</div>
        <div class="badge subtle" id="dailyDate" hidden></div>
      </div>
      <div class="hint">Arrow keys or A/D to move. Touch left/right on mobile.</div>
    </div>

    <div class="hud-right">
      <div class="stat">HEIGHT: <span id="height">0</span></div>
      <div class="stat">BEST: <span id="best">0</span></div>
      <button id="trophyBtn" type="button" title="View trophies">Trophies <span id="trophyCount">0/12</span></button>
      <button id="pauseBtn" type="button">Pause</button>
      <button id="muteBtn" type="button">Mute</button>
      <button id="modeBtn" type="button" title="Switch between Classic and Daily">Mode</button>
      <button id="restart" type="button">Restart</button>
    </div>
  </header>

  <main class="wrap">
    <canvas id="game" width="600" height="650" aria-label="Hell Climb canvas"></canvas>
  </main>

  <div id="mainMenu" class="overlay menu-overlay">
    <div class="panel menu-panel">
      <div class="panel-title">HELL CLIMB</div>
      <div class="menu-stats">
        <div>CLASSIC BEST: <span id="menuClassicBest">0</span></div>
        <div>DAILY BEST: <span id="menuDailyBest">0</span></div>
      </div>
      <div class="menu-actions">
        <button id="playBtn" type="button">Play</button>
        <button id="menuModeBtn" type="button">Mode: Classic</button>
        <button id="menuTrophyBtn" type="button">Trophies</button>
      </div>
      <div class="sound-row">
        <button id="menuMuteBtn" type="button">Mute</button>
        <label for="volumeSlider">Volume</label>
        <input id="volumeSlider" type="range" min="0" max="100" value="70" />
      </div>
    </div>
  </div>

  <div id="pauseOverlay" class="overlay pause-overlay" hidden>
    <div class="panel pause-panel">
      <div class="panel-title">PAUSED</div>
      <div class="menu-actions">
        <button id="resumeBtn" type="button">Resume</button>
        <button id="pauseMenuBtn" type="button">Main Menu</button>
      </div>
    </div>
  </div>

  <div id="overlay" class="overlay" hidden>
    <div class="panel">
      <div class="panel-title">GAME OVER</div>
      <div class="panel-body">Final height: <span id="final">0</span></div>
      <div class="panel-sub" id="resultLine"></div>
      <button id="playAgain" type="button">Play Again</button>
    </div>
  </div>

  <div id="trophyOverlay" class="overlay" hidden>
    <div class="panel trophy-panel" role="dialog" aria-modal="true" aria-labelledby="trophyTitle">
      <div class="panel-title" id="trophyTitle">TROPHIES</div>
      <div class="panel-sub" id="trophyProgress">0/12 earned</div>
      <div class="trophy-list" id="trophyList"></div>
      <button id="closeTrophies" type="button">Close</button>
    </div>
  </div>

  <div id="trophyToast" class="trophy-toast" role="status" aria-live="polite" hidden></div>

  <script src="game.js" defer></script>
</body>
</html>
