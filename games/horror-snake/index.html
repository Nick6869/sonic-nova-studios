<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Serpent of the Grave</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="game-shell">
    <header class="game-header">
      <div class="title-lockup">
        <h1>Serpent of the Grave</h1>
        <span id="omenName" class="omen-chip">Nightfall</span>
      </div>

      <button id="muteBtn" class="small-btn" type="button">Sound: On</button>
    </header>

    <section class="hud">
      <div class="hud-card">
        <span>Souls Eaten</span>
        <strong id="score">0</strong>
      </div>

      <div class="hud-card">
        <span>Best Curse</span>
        <strong id="highScore">0</strong>
      </div>

      <div class="hud-card">
        <span>Horror Zone</span>
        <strong id="stageName">Graveyard</strong>
      </div>

      <div class="hud-card">
        <span>Streak</span>
        <strong id="streak">0x</strong>
      </div>
    </section>

    <section class="game-area">
      <canvas id="gameCanvas" width="600" height="600" aria-label="Horror Snake game board"></canvas>

      <div id="overlay" class="overlay">
        <div class="overlay-card">
          <h2 id="overlayTitle">Serpent of the Grave</h2>
          <p id="overlayText" aria-live="polite"></p>
          <button id="startBtn" class="main-btn" type="button">Start Run</button>
        </div>
      </div>
    </section>

    <section class="controls">
      <div class="key-strip" aria-label="Keyboard controls">
        <span>WASD</span>
        <span>Arrows</span>
        <span>Space</span>
        <span>Enter</span>
        <span>M</span>
      </div>

      <div class="mobile-controls" aria-label="Mobile controls">
        <button class="dir-btn up" data-dir="up" type="button" aria-label="Up">&uarr;</button>
        <button class="dir-btn left" data-dir="left" type="button" aria-label="Left">&larr;</button>
        <button class="dir-btn down" data-dir="down" type="button" aria-label="Down">&darr;</button>
        <button class="dir-btn right" data-dir="right" type="button" aria-label="Right">&rarr;</button>
      </div>
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
