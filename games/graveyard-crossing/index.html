<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>Graveyard Crossing</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="game-shell">
      <div class="title-wrap">
        <h1>Graveyard Crossing</h1>
        <p>Cross the cursed road, ride the coffins, and seal every grave.</p>
      </div>

      <div class="canvas-wrap">
        <canvas
          id="gameCanvas"
          width="720"
          height="768"
          aria-label="Graveyard Crossing arcade game"
        ></canvas>
      </div>

      <div class="touch-controls" aria-label="Mobile game controls">
        <div class="mobile-actions">
          <button type="button" class="action-btn" data-action="start">Start</button>
          <button type="button" class="action-btn" data-action="pause">Pause</button>
          <button type="button" class="action-btn" data-action="restart">Restart</button>
        </div>

        <div class="dpad" aria-label="Movement controls">
          <span></span>
          <button type="button" class="control-btn" data-action="up" aria-label="Move up">^</button>
          <span></span>

          <button type="button" class="control-btn" data-action="left" aria-label="Move left">&lt;</button>
          <button type="button" class="control-btn center-pad" data-action="start" aria-label="Start game">Start</button>
          <button type="button" class="control-btn" data-action="right" aria-label="Move right">&gt;</button>

          <span></span>
          <button type="button" class="control-btn" data-action="down" aria-label="Move down">v</button>
          <span></span>
        </div>
      </div>

      <div class="controls">
        <p><strong>Move:</strong> Arrow Keys, WASD, swipe, or D-pad</p>
        <p><strong>Start:</strong> Enter or Space</p>
        <p><strong>Pause:</strong> P or Pause</p>
        <p><strong>Restart:</strong> R or Restart</p>
      </div>
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
