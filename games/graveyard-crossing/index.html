<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Graveyard Crossing</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="game-shell">
      <div class="title-wrap">
        <h1>Graveyard Crossing</h1>
        <p>Get the survivor to all five graves before the nightmare catches up.</p>
      </div>

      <canvas id="gameCanvas" width="720" height="768"></canvas>

      <div class="controls">
        <p><strong>Move:</strong> Arrow Keys or WASD</p>
        <p><strong>Start:</strong> Enter or Space | <strong>Pause:</strong> P | <strong>Restart:</strong> R</p>
      </div>
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
